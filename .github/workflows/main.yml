name: Mirror to Private Repo

on:
  push:
    branches:
      - main  # 메인 브랜치명 확인
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to private mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.VERCEL_OWNER_PAT }}@github.com/teamdaewu-do-ring/do-ring-frontend.git
          git push mirror main --force
