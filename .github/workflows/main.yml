name: Mirror to Private Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MIRROR_PRIVATE_KEY }}

      - name: Add mirror host to known_hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to private mirror
        run: |
          git config user.email "teamdaewu@gmail.com"
          git config user.name "teamdaewu-do-ring"
          git checkout --orphan mirror-branch
          git add -A
          git commit -m "sync: mirror from main repo"
          git remote add mirror git@github.com:teamdaewu-do-ring/do-ring-frontend.git
          git push mirror mirror-branch:main --force
